# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────────
# LOCAL USE:
#   Create the folder .streamlit/ in your project root and save
#   this file there. It is read automatically by Streamlit.
#   Add .streamlit/secrets.toml to your .gitignore.
#
# STREAMLIT CLOUD:
#   Do NOT commit this file. Instead, copy the key=value pairs
#   into your app's Settings → Secrets on share.streamlit.io.
# ─────────────────────────────────────────────────────────────────

OPENAI_API_KEY   = "sk-..."          # required
OPENAI_LLM_MODEL = "gpt-4o-mini"    # optional, default shown
CHROMA_DB_DIR    = "./chroma_db"     # optional, default shown
